<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waiting Approval</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

.box{
  text-align:center;
  padding:20px;
  border:1px solid #333;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.loader{
  width:50px;
  height:50px;
  border:4px solid #333;
  border-top:4px solid #00ff99;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:20px auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="box">
  <h2>waiting for approval...</h2>
  <div class="loader"></div>
  <p id="info">checking order...</p>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let orderId = params.get("id");

function check(){
  let order = localStorage.getItem("order_" + orderId);

  if(!order){
    document.getElementById("info").innerText = "order not found 💀";
    return;
  }

  order = JSON.parse(order);

  if(order.status === "approved"){
    window.location.href = "ticket.html?id=" + orderId;
  } else {
    document.getElementById("info").innerText = "still waiting 😭";
  }
}

setInterval(check, 2000);
check();
</script>

</body>
</html>
